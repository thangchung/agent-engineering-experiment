# Apply this once before deploying:
#   kubectl apply -f deploy/aks/namespace.yaml
#   kubectl create secret generic copilot-secret \
#     --namespace mcp-experiments \
#     --from-literal=github-token=<YOUR_GITHUB_TOKEN>
#
# Or apply this manifest after replacing <BASE64_GITHUB_TOKEN>:
#   echo -n 'github_pat_or_gho_or_ghu_token_here' | base64
apiVersion: v1
kind: Secret
metadata:
  name: copilot-secret
  namespace: mcp-experiments
type: Opaque
data:
  # Base64-encoded GitHub token for Copilot SDK authentication.
  # Supported token types: gho_, ghu_, or github_pat_.
  # Fine-grained github_pat_ tokens must include the "Copilot Requests" permission.
  # Generate: echo -n 'github_pat_...' | base64
  github-token: <BASE64_GITHUB_TOKEN>
