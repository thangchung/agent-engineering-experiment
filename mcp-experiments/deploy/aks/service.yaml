apiVersion: v1
kind: Service
metadata:
  name: opensandbox-server
  namespace: mcp-experiments
spec:
  selector:
    app: opensandbox-server
  ports:
    - name: http
      port: 8080
      targetPort: 8080
  type: ClusterIP
---
apiVersion: v1
kind: Service
metadata:
  name: aspire-dashboard
  namespace: mcp-experiments
spec:
  selector:
    app: aspire-dashboard
  ports:
    - name: ui
      port: 18888
      targetPort: 18888
    - name: otlp-grpc
      port: 18889
      targetPort: 18889
    - name: otlp-http
      port: 18890
      targetPort: 18890
  type: ClusterIP
---
apiVersion: v1
kind: Service
metadata:
  name: mcp-server
  namespace: mcp-experiments
spec:
  selector:
    app: mcp-server
  ports:
    - name: http
      port: 8081
      targetPort: 8081
  type: ClusterIP
---
apiVersion: v1
kind: Service
metadata:
  name: testweb
  namespace: mcp-experiments
spec:
  selector:
    app: testweb
  ports:
    - name: http
      port: 8082
      targetPort: 8082
  type: ClusterIP
