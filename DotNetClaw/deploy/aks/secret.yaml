# Create from CLI instead of checking in real tokens:
#   kubectl create secret generic slack-secret \
#     --namespace dotnetclaw \
#     --from-literal=bot-token=xoxb_xxx \
#     --from-literal=app-token=xapp_xxx \
#     --from-literal=bot-user-id=UXXXXXX
#
# Or apply this template after base64-encoding each value.
apiVersion: v1
kind: Secret
metadata:
  name: slack-secret
  namespace: dotnetclaw
type: Opaque
data:
  bot-token: <BASE64_SLACK_BOT_TOKEN>
  app-token: <BASE64_SLACK_APP_TOKEN>
  bot-user-id: <BASE64_SLACK_BOT_USER_ID>
