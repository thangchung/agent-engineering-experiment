<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DotNetClaw Chat</title>
    <link rel="stylesheet" href="/app.css" />
</head>
<body>
    <header>
        <h1>DotNetClaw</h1>
        <button id="reset-btn" onclick="resetChat()">Reset Session</button>
    </header>

    <div id="chat-log">
        <div class="msg assistant">Hi! I'm DotNetClaw. How can I help you today?</div>
    </div>
    <div id="typing-indicator">Thinking...</div>

    <div class="compose">
        <textarea id="message-input" rows="1" placeholder="Type a message..." 
                  onkeydown="handleKey(event)"></textarea>
        <button id="send-btn" onclick="sendMessage()">Send</button>
    </div>

    <script>
        const chatLog = document.getElementById('chat-log');
        const input   = document.getElementById('message-input');
        const sendBtn = document.getElementById('send-btn');
        const typing  = document.getElementById('typing-indicator');

        function scrollToBottom() {
            chatLog.scrollTop = chatLog.scrollHeight;
        }

        function addMessage(role, text) {
            const div = document.createElement('div');
            div.className = 'msg ' + role;
            div.textContent = text;
            chatLog.appendChild(div);
            scrollToBottom();
        }

        function handleKey(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        }

        // Auto-grow textarea
        input.addEventListener('input', () => {
            input.style.height = 'auto';
            input.style.height = Math.min(input.scrollHeight, 128) + 'px';
        });

        async function sendMessage() {
            const text = input.value.trim();
            if (!text || sendBtn.disabled) return;

            addMessage('user', text);
            input.value = '';
            input.style.height = 'auto';

            sendBtn.disabled = true;
            sendBtn.textContent = 'Sending...';
            typing.classList.add('visible');
            scrollToBottom();

            try {
                const res = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: text }),
                });

                if (!res.ok) {
                    const err = await res.json().catch(() => ({ error: res.statusText }));
                    addMessage('error', 'Error: ' + (err.error || res.statusText));
                    return;
                }

                const data = await res.json();
                addMessage('assistant', data.reply || '(empty response)');
            } catch (err) {
                addMessage('error', 'Network error: ' + err.message);
            } finally {
                sendBtn.disabled = false;
                sendBtn.textContent = 'Send';
                typing.classList.remove('visible');
                input.focus();
            }
        }

        async function resetChat() {
            try {
                await fetch('/api/chat/reset', { method: 'POST' });
                chatLog.innerHTML = '';
                addMessage('assistant', 'Session reset. How can I help you?');
            } catch (err) {
                addMessage('error', 'Reset failed: ' + err.message);
            }
        }

        input.focus();
    </script>
</body>
</html>
